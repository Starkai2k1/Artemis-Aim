  <body>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('archeryDefaults');
          var defaults = saved ? JSON.parse(saved) : null;
          var theme = (defaults && defaults.theme) ? defaults.theme : 'system';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark-black' : 'light';
          }
          if (theme !== 'light') {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
  </body>
